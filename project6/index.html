<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container{
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 15fr 2fr ;
            width: 100vw;
            height: 100vh;
           

        }
footer {
  grid-column: 1 / 3;
  background-color: rgb(7, 7, 26);
  padding: 20px;
    border-top: 1px solid grey;
  padding-top: 1rem;
  
  
}
 .left h1{
    color: white;
    font-size: 3rem;

    text-align: center;
}
.left img{
    width: 9rem;
    height: 6rem;
    margin-top: 2rem;
}

.footer {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  text-align: center;
  color: grey;

}
        footer div a {
            text-decoration: none;
            color: grey;
            font-size: 0.8rem;
        }
        .left{
             background-color: rgb(12, 12, 37);
        }
        .right{
            border-left:0.2rem solid grey;
            background-color: white;
          background-color: rgb(31, 31, 59);

        }
        .innerleft{
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 10rem 3rem;
            color: white;
        }
        .log{
            border-radius: 2rem;
            padding: 1rem;
            background-color: rgb(11, 11, 88);
            opacity: 0.6;
            color: white;
            font-size: 1rem;

        }
        .forgot{
            background-color: none;
            color: black;
            text-decoration: none;
        }
        .forgotp{
            display: flex;
            justify-content: center;
            
        }
        .forgot{
            color: white;
        }

        button,input{
            border-radius: 2rem;
            background-color: rgb(107, 129, 138);
            padding: 1rem;
        }
        .meta{
           text-align: center;
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
        }
        .meta img{
            width: 1.6rem;
            height: 1.6rem;
       
        }
        .left .card{
            margin-top: 2rem;
            width: 30rem;
            height: 25rem;
            margin-left: 25rem;
           
        }
        .createA{
            border: rgb(31, 31, 119) 3px solid;
            color: rgb(31, 31, 119);
        }
        .innerleft input button {
            background-color: rgb(67, 107, 122);
        }




    </style>
</head>
<body>
    <div class="container">
        <div class="left">
          <img src="Screenshot from 2026-03-16 09-32-00.png" alt="instagram-logo">

          <h1>See everyday moments from <br>
            your close friends.</h1>

         <img src="Screenshot from 2026-03-16 09-31-40.png" alt="" class="card">

        </div>
        <div class="right">
            <div class="innerleft">
                <p>Login into instagram</p>
                <input type="text" placeholder="Mobile number,username or email">
                <input type="password" placeholder="password">
                <button class="log">Login in </button>
                <p class="forgotp"><a href="" class="forgot">Forgot password?</a></p>
                <button class="loginfb">Log in with Facebook</button>
                <button class="createA">Create new account</button>
                <p class="meta"><img src="meta.png" alt="">Meta</p>





            </div>
        </div>

        <footer>
           <div class="footer">
             <a href="">Meta</a><a href="">About</a><a href="">Blog</a><a href="">Jobs</a><a href="">Helps</a><a href="">API</a><a href="">Privacy</a><a href="">Terms</a><a href="">Locations</a><a href="">Instagram Lite </a><a href="">Meta AI</a><a href="">Threads</a><a href="">Contact Uploading & Non-Users</a><a href="">Meta Verified</a><a href="">English</a>
            <p>© 2026 Instagram from Meta</p>
           </div>
        </footer>
    </div>
    
</body>
</html>
