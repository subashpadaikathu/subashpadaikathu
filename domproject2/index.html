<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <img id="bulb" src="https://www.w3schools.com/js/pic_bulboff.gif" alt="bulb">
    <button id="button" onclick="toggleBulb()">on</button>
    <script>
        const imgs = document.getElementById("bulb");
        const button = document.getElementById("button");

        function toggleBulb(){
            if (imgs.src = "https://www.w3schools.com/js/pic_bulboff.gif"){

                imgs.src = "https://www.w3schools.com/js/pic_bulbon.gif";
                button.innerText = "off";


                
            }else{
                imgs.src = "https://www.w3schools.com/js/pic_bulboff.gif";
                button.innerText = "on";

            }   
        }
        
    </script>
    
</body>
</html>
